spring:
  application:
    name: restaurant-service

  data:
    web:
      pageable:
        default-page-size: 10
        max-page-size: 50

  kafka:
    consumer:
      group-id: restaurant-service-check-in-consumer
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  cache:
    type: redis

server:
  port: ${SERVER_PORT:19300}

management:
  endpoints:
    web:
      exposure:
        include: health,info

internal:
  auth:
    secret: ${INTERNAL_AUTH_SECRET}

jwt:
  secret: ${JWT_SECRET}

feign:
  reservation-service:
    url: ${FEIGN_RESERVATION_SERVICE_URL:}

kafka:
  topic:
    reservation-check-in-completed: reservation.checked-in

cache:
  ttl:
    restaurant-detail: ${CACHE_TTL_RESTAURANT_DETAIL:300}
    restaurant-courses: ${CACHE_TTL_RESTAURANT_COURSES:300}