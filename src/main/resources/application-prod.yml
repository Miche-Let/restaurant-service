spring:
  config:
    activate:
      on-profile: prod

  application:
    name: restaurant-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT:5432}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:5}
      minimum-idle: ${DB_MIN_IDLE:1}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:3000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:restaurant-service-check-in-consumer}
      auto-offset-reset: latest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      auto-startup: ${KAFKA_LISTENER_AUTO_STARTUP:true}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: restaurant_service
        format_sql: true
    open-in-view: false
    show-sql: false

  cloud:
    inetutils:
      ignored-interfaces:
        - "lo"
        - "docker.*"
        - "veth.*"
      preferred-networks:
        - "10.0"
      use-only-site-local-interfaces: true

server:
  port: ${SERVER_PORT:19300}

eureka:
  client:
    enabled: ${EUREKA_ENABLED:false}
    service-url:
      defaultZone: http://${EUREKA_HOST}:${EUREKA_PORT:8761}/eureka/
  instance:
    prefer-ip-address: true

internal:
  auth:
    secret: ${INTERNAL_AUTH_SECRET}

jwt:
  secret: ${JWT_SECRET}

feign:
  reservation-service:
    url: ${FEIGN_RESERVATION_SERVICE_URL:}

kafka:
  topic:
    reservation-check-in-completed: ${KAFKA_TOPIC_RESERVATION_CHECK_IN_COMPLETED:reservation.checked-in}

cache:
  ttl:
    restaurant-detail: ${CACHE_TTL_RESTAURANT_DETAIL:300}
    restaurant-courses: ${CACHE_TTL_RESTAURANT_COURSES:300}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}