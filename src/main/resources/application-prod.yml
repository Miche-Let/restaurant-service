server:
  port: ${SERVER_PORT:19300}

spring:
  application:
    name: restaurant-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:restaurant-service-check-in-consumer}
      auto-offset-reset: latest
      enable-auto-commit: false

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: restaurant_service
        format_sql: true
    show-sql: false

  cloud:
    inetutils:
      ignored-interfaces:
        - "lo"
        - "docker.*"
        - "veth.*"
      preferred-networks:
        - "10.0"
      use-only-site-local-interfaces: true

eureka:
  client:
    enabled: ${EUREKA_ENABLED:false}
    service-url:
      defaultZone: http://${EUREKA_HOST}:${EUREKA_PORT}/eureka/
  instance:
    prefer-ip-address: true

kafka:
  topic:
    reservation-check-in-completed: ${KAFKA_TOPIC_RESERVATION_CHECK_IN_COMPLETED:reservation.checked-in}

cache:
  ttl:
    restaurant-detail: ${CACHE_TTL_RESTAURANT_DETAIL:300}
    restaurant-courses: ${CACHE_TTL_RESTAURANT_COURSES:300}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always