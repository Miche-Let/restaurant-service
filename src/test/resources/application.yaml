spring:
  application:
    name: restaurant-service

  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false
    consumer:
      group-id: restaurant-service-check-in-consumer-test
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

eureka:
  client:
    enabled: false

internal:
  auth:
    secret: test-internal-auth-secret-for-restaurant-service-at-least-32-bytes

jwt:
  secret: test-jwt-secret-key-for-restaurant-service-at-least-32-bytes

feign:
  reservation-service:
    url: http://localhost:19500

kafka:
  topic:
    reservation-check-in-completed: reservation.check-in.completed